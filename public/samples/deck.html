<!DOCTYPE html>
<html lang="ja" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <title>Sample Project Deck - Slide 1</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #f8fafc;
      }
    </style>
  </head>
  <body>
    <div class="slide-container" style="position: relative; width: 1280px; height: 720px; overflow: hidden;">
      <div data-object="true" data-object-type="shape" style="position: absolute; left: 680px; top: 0px; width: 600px; height: 720px; z-index: 1;">
        <svg fill="none" height="720" viewBox="0 0 600 720" width="600" xmlns="http://www.w3.org/2000/svg">
          <path d="M120 0 L600 0 L600 720 L-40 720 Z" fill="#00BCD4"></path>
          <path d="M180 0 L600 0 L600 720 L20 720 Z" fill="#00A5BB"></path>
          <path d="M240 0 L600 0 L600 720 L80 720 Z" fill="#0093A7"></path>
          <circle cx="400" cy="360" opacity="0.15" r="240" stroke="#ffffff" stroke-dasharray="12 12" stroke-width="2"></circle>
        </svg>
      </div>
      <div data-object="true" data-object-type="shape" style="position: absolute; left: 40px; top: 580px; width: 200px; height: 100px; z-index: 1;">
        <svg fill="none" height="100" viewBox="0 0 200 100" width="200" xmlns="http://www.w3.org/2000/svg">
          <pattern height="20" id="dots_pattern" patternUnits="userSpaceOnUse" width="20" x="0" y="0">
            <circle cx="3" cy="3" fill="#00BCD4" fill-opacity="0.2" r="3"></circle>
          </pattern>
          <rect fill="url(#dots_pattern)" height="100" width="200"></rect>
        </svg>
      </div>
      <div data-object="true" data-object-type="shape" style="position: absolute; left: 760px; top: 220px; width: 440px; height: 280px; z-index: 5;">
        <svg fill="none" height="280" style="filter: drop-shadow(0 25px 30px rgba(0,0,0,0.3));" viewBox="0 0 440 280" width="440" xmlns="http://www.w3.org/2000/svg">
          <rect fill="#ffffff" height="280" rx="12" width="440"></rect>
          <rect fill="#F1F5F9" height="40" rx="12" width="440"></rect>
          <rect fill="#E2E8F0" height="1" width="440" y="40"></rect>
          <circle cx="24" cy="20" fill="#EF4444" r="5"></circle>
          <circle cx="44" cy="20" fill="#F59E0B" r="5"></circle>
          <circle cx="64" cy="20" fill="#10B981" r="5"></circle>
          <rect fill="#1E293B" height="146" rx="6" width="280" x="20" y="60"></rect>
          <rect fill="#334155" height="68" rx="6" width="104" x="316" y="60"></rect>
          <rect fill="#334155" height="68" rx="6" width="104" x="316" y="138"></rect>
          <rect fill="#F8FAFC" height="42" rx="6" width="400" x="20" y="222"></rect>
          <rect fill="#00BCD4" height="24" rx="12" width="64" x="188" y="231"></rect>
          <path d="M152 121 L168 133 L152 145 Z" fill="#9CA3AF"></path>
        </svg>
      </div>
      <div data-object="true" data-object-type="textbox" style="position: absolute; left: 120px; top: 200px; width: 500px; height: 30px; z-index: 10;">
        <p style="margin: 0; font-family: 'Montserrat', 'Noto Sans JP', sans-serif; font-size: 16px; font-weight: 700; color: #00BCD4; letter-spacing: 0.15em; text-transform: uppercase;">Project Summary</p>
      </div>
      <div data-object="true" data-object-type="textbox" style="position: absolute; left: 115px; top: 230px; width: 500px; height: 180px; z-index: 10;">
        <p style="margin: 0; font-family: 'Montserrat', 'Noto Sans JP', sans-serif; font-size: 112px; font-weight: 900; color: #0F172A; line-height: 1.1; letter-spacing: -0.02em;">Sample<span style="color: #00BCD4;">.</span></p>
      </div>
      <div data-object="true" data-object-type="textbox" style="position: absolute; left: 120px; top: 410px; width: 600px; height: 100px; z-index: 10;">
        <p style="margin: 0; font-family: 'Noto Sans JP', sans-serif; font-size: 32px; font-weight: 700; color: #334155; line-height: 1.4;">提案資料やデザイン案を、素早く共有するためのサンプルです</p>
      </div>
      <div data-object="true" data-object-type="textbox" style="position: absolute; left: 156px; top: 506px; width: 400px; height: 32px; z-index: 10;">
        <p style="margin: 0; font-family: 'Montserrat', 'Noto Sans JP', sans-serif; font-size: 24px; font-weight: 600; color: #64748B;">demo workspace</p>
      </div>
      <div data-object="true" data-object-type="textbox" style="position: absolute; left: 820px; top: 660px; width: 400px; height: 30px; z-index: 10;">
        <p style="margin: 0; font-family: 'Montserrat', 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: 500; color: #ffffff; text-align: right; opacity: 0.9; letter-spacing: 0.05em;">sample presentation document</p>
      </div>
    </div>
  </body>
</html>
